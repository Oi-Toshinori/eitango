<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語テスト</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    margin-top:50px;
}

button{
    font-size:24px;
    padding:10px 20px;
    margin:10px;
}

#word{
    font-size:40px;
    margin:30px;
}
</style>
</head>

<body>

<h1>英単語テスト</h1>

<div id="word">Press Start</div>

<button id="startBtn">開始</button>
<button id="nextBtn" style="display:none;">次へ</button>

<script>

const words = [
    {
        word: "apple",
        audio: "apple.mp3"
    },
    {
        word: "dog",
        audio: "dog.mp3"
    },
    {
        word: "book",
        audio: "book.mp3"
    }
];

let current = 0;

const wordDiv = document.getElementById("word");
const startBtn = document.getElementById("startBtn");
const nextBtn = document.getElementById("nextBtn");

/* =========================
   iPad対応版 Audio
========================= */

const audio = new Audio();

/* 音声解放 */
async function unlockAudio() {

    try {

        audio.src = words[0].audio;

        audio.volume = 0;

        await audio.play();

        audio.pause();

        audio.currentTime = 0;

        audio.volume = 1;

        console.log("audio unlocked");

    } catch(e) {

        console.log(e);
    }
}

/* 単語再生 */
async function playCurrentWord() {

    wordDiv.textContent = words[current].word;

    try {

        audio.pause();

        audio.src = words[current].audio;

        audio.load();

        audio.currentTime = 0;

        await audio.play();

    } catch(e) {

        console.log(e);
    }
}

/* =========================
   開始ボタン
========================= */

startBtn.addEventListener("click", async () => {

    await unlockAudio();

    startBtn.style.display = "none";

    nextBtn.style.display = "inline-block";

    current = 0;

    await playCurrentWord();
});

/* =========================
   次へボタン
========================= */

nextBtn.addEventListener("click", async () => {

    current++;

    if(current >= words.length){

        wordDiv.textContent = "終了";

        nextBtn.disabled = true;

        return;
    }

    await playCurrentWord();
});

</script>

</body>
</html>
